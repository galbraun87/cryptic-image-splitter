<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" 
        content="width=device-width, 
                 initial-scale=1.0">
  <title>Splitter V2</title>
  <style>
    @font-face {
      font-family: 'EscapeFont';
      src: url('DobkinScript.ttf') 
           format('truetype');
    }
    body {
      font-family: sans-serif;
      margin: 10px;
      background: #eeeff3;
      text-align: center;
    }
    .container {
      max-width: 100%;
      margin: 0 auto;
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-sizing: border-box;
    }
    .controls {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: left;
    }
    .control-group {
      display: block;
      margin: 12px 0;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }
    input, button {
      padding: 12px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
      width: 100%;
      box-sizing: border-box;
    }
    input[type="number"] {
      width: 60px;
      display: inline-block;
    }
    .inline-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .inline-item {
      flex: 1;
      min-width: 65px;
    }
    button.primary {
      background: #28a745;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }
    .output-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    @media(min-width: 600px) {
      .output-grid {
        grid-template-columns: 
          repeat(auto-fit, 
                 minmax(240px, 1fr));
      }
    }
    .canvas-container {
      background: #fafafa;
      padding: 10px;
      border-radius: 8px;
      border: 1px dashed #bbb;
    }
    canvas { display: none; }
    img.out-img {
      max-width: 100%;
      height: auto;
      border: 1px solid #eee;
      background: white;
    }
    .master-container {
      grid-column: 1 / -1;
      background: #fff8e1;
      border: 2px solid #ffe082;
    }
    .hint {
      font-size: 13px;
      color: #777;
      margin-top: 5px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Image Splitter V2</h1>
  
  <div class="controls">
    <div class="control-group">
      <label>1. Code Text (Max 20 chars):</label>
      <div style="display: flex; gap: 8px;">
        <input type="text" id="codeText" 
               value="9582" maxlength="20">
        <button type="button" 
                onclick="setRandomCode()" 
                style="width: auto; 
                       white-space: nowrap; 
                       background: #6c757d; 
                       color: white; 
                       border: none; 
                       cursor: pointer;">
          🎲 Random 4-Digit
        </button>
      </div>
    </div>
    <div class="control-group">
      <label>OR Choose Source Image:</label>
      <input type="file" id="imageLoader" 
             accept="image/*">
    </div>
    
    <div class="inline-group">
      <div class="inline-item">
        <label>Cols (M):</label>
        <input type="number" id="colsCount" 
               value="4" min="1" max="50">
      </div>
      <div class="inline-item">
        <label>Rows (N):</label>
        <input type="number" id="rowsCount" 
               value="8" min="1" max="300">
      </div>
      <div class="inline-item">
        <label>Layers:</label>
        <input type="number" 
               id="layersCount" 
               value="4" min="2" max="10">
      </div>
    </div>

    <button id="shuffleBtn" 
            class="primary" 
            onclick="remixCurrent()">
      🎲 Remix Layers
    </button>
  </div>

  <div id="outputGrid" 
       class="output-grid"></div>
</div>

<script src="script.js"></script>
</body>
</html>
